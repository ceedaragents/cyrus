name: CI

on:
  push:
    branches:
      - main
      - 'cypack-*'
  pull_request:
    branches:
      - main
      - 'cypack-*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref }}
    
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      uses: ./.github/actions/install-dependencies
    
    - name: Create .env file
      run: |
        cat > .env << EOF
        LINEAR_WEBHOOK_SECRET=test
        WEBHOOK_PORT=3000
        WORKSPACE_BASE_DIR=./tmp/workspaces
        PROMPT_TEMPLATE_PATH=./examples/prompt-template.txt
        ANTHROPIC_API_KEY=test
        EOF
    
    - name: Run Biome
      run: pnpm biome ci
    
    - name: Build Packages
      run: pnpm build

    - name: Regenerate JSON Schemas
      if: matrix.node-version == '22.x' && github.event_name == 'pull_request'
      run: pnpm --filter cyrus-core generate:json-schema

    - name: Commit updated schemas
      if: matrix.node-version == '22.x' && github.event_name == 'pull_request'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: regenerate JSON Schema files"
        file_pattern: "packages/core/schemas/*.json"

    - name: Run Tests
      run: pnpm -r test:run
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      continue-on-error: true
      with:
        directory: ./coverage/
        fail_ci_if_error: false